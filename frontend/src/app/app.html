<aside class="sidebar" [class.collapsed]="isSidebarCollapsed">
  <div class="toggle-btn" (click)="toggleSidebar()">
    <span style="font-size: 1.2rem; cursor: pointer;">{{ isSidebarCollapsed ? '→' : '←' }}</span>
  </div>

  <div class="sidebar-brand">
    <div class="logo-box">B</div>
    <span *ngIf="!isSidebarCollapsed" class="brand-text">Biblioteca<span>System</span></span>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
      <span class="icon">📊</span>
      <span *ngIf="!isSidebarCollapsed">Dashboard</span>
    </a>
    <a routerLink="/books" routerLinkActive="active" class="nav-item">
      <span class="icon">📚</span>
      <span *ngIf="!isSidebarCollapsed">Livros</span>
    </a>
    <a routerLink="/authors" routerLinkActive="active" class="nav-item">
      <span class="icon">✍️</span>
      <span *ngIf="!isSidebarCollapsed">Autores</span>
    </a>
    <a routerLink="/loans" routerLinkActive="active" class="nav-item">
      <span class="icon">🤝</span>
      <span *ngIf="!isSidebarCollapsed">Empréstimos</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="avatar"></div>
    <div *ngIf="!isSidebarCollapsed" class="user-info">
      <div class="user-name">Admin User</div>
      <div class="user-role">Librarian</div>
    </div>
  </div>
</aside>

<main class="main-content" [class.expanded]="isSidebarCollapsed">
  <router-outlet></router-outlet>
</main>
